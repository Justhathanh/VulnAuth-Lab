<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VulnAuth Lab{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="warning-banner">
        ⚠ INTENTIONALLY VULNERABLE — For educational purposes only.
    </div>

    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="nav-brand">VulnAuth Lab</a>
        <div class="nav-links">
            <a href="{{ url_for('index') }}">Challenges</a>
            {% if user %}
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('auth.logout') }}">Logout ({{ user }})</a>
            {% else %}
            <a href="{{ url_for('auth.login') }}">Login</a>
            <a href="{{ url_for('auth.register') }}">Register</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        VulnAuth Lab — Learn by breaking, fix by understanding.
    </footer>
</body>

</html>
